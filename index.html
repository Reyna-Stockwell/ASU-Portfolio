ayName":false,"displayPrompt":false,"instructional":false,"private":false},"styles":{"version":"v2","fontFamily":"Roboto","fontSize":26,"color":"#000000","textAlign":"right","name":{"fontSize":40},"padding":10,"link":{"color":"#337ab7"},"linkHover":{"color":"#337ab7"},"backgroundColor":{"backgroundColor":"#ffc647","opacity":1},"backgroundImage":{"backgroundAttachment":"fixed"}},"classes":[]},{"id":283154087,"sourceId":192276569,"pageId":77041777,"slideId":89779825,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"8d82","text":"About Me","type":"header-one","depth":0,"inlineStyleRanges":[{"offset":0,"length":8,"style":"BOLD"}],"entityRanges":[],"data":{}},{"key":"d18ff","text":"Professional Portfolio","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":7,"y":914,"h":158,"w":5,"minH":158,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"private":false},"styles":{"version":"v2","fontFamily":"Helvetica, Arial, sans-serif","fontSize":19,"color":"#fafafa","textAlign":"right","name":{"fontSize":40},"padding":10,"link":{"color":"#337ab7"},"linkHover":{"color":"#337ab7"},"backgroundColor":{"backgroundColor":"#323232","opacity":0.49},"backgroundImage":{"backgroundAttachment":"fixed"}},"classes":[]},{"id":283154088,"sourceId":192276571,"pageId":77041777,"slideId":89779825,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"5mk63","text":"Hello, my name is Reyna Stockwell. I am a senior studying Chemical Engineering with a minor in Dance at Arizona State University, and I will be graduating this upcoming May 2026. In this portfolio I will discuss and represent my projects and experiences for my talent, multicultural, multidisciplinary, entrepreneurship and social consciousness competencies. Each of these experiences maintained my focus of sustainability throughout my time in the Grand Challenges Scholars Program. ","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"34kkp","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"3ugca","text":"I am interested in pursuing sustainability, polymer materials, nanotechnology, and semiconductors. I am motivated by the advancement of material science and engineering to address environmental challenges that are facing communities all over the world. Currently, I conduct polymer research under Dr. Kailong Jin, where my work focuses on the recyclability of dynamically crosslinked thiol–ene photopolymers. I am focusing on the structure, material performance, and recyclability of my polymer samples with the goal of developing more sustainable polymer systems. I have gained experience in polymer synthesis, material characterization, and experimental design, and it has sparked an interest in materials research in my future career. ","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"3kk1c","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"2d4sg","text":"In addition to this research, I have participated in multiple interdisciplinary and international projects. Through Engineering Projects in Community Service (EPICS), I worked on water treatment solutions for shrimp farmers in Da Nang, Vietnam, applying engineering to improve water quality and support local farmers. I also studied food sustainability in Egypt, where I learned about the environmental and cultural factors influencing sustainable farming and food manufacturing in the area. ","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"3n3i8","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"ia12","text":"I have further research experience in biomedical science through work under Dr. Jeffery Kordower, where I contributed to studies on Alzheimer’s disease using rodent and non-human primate models. I have also worked in the Ecuadorian Amazon rainforest, where I helped develop a prototype for sustainable, solar-powered canoes to improve transportation access for the Waorani and Kichwa Indigenous communities. ","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"2m0po","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"f3u2d","text":"Additionally, I volunteer each semester building homes in Agua Prieta, Sonora, MX. This is a very meaningful experience that has shaped my commitment for community service and understanding the communities that I serve through engineering. These experiences have reinforced my belief that effective engineering solutions must be both useful and understanding of the needs of the communities they serve.","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"ddiqn","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"2qn5i","text":"After graduation, I plan to work in the semiconductor industry or pursue a career in polymer and materials research and development, particularly in advancing sustainable materials. I am passionate about continuing my volunteer and community service, as giving back remains a meaningful part of my personal and professional goals. Through my academic training, research, and global experiences, I hope to contribute to a more sustainable, equitable, and innovative future.","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":5,"h":1278,"w":6,"minH":1164,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"private tAlignment":"left","captionPadding":20,"backgroundColor":"#333","backgroundOpacity":60,"pdfViewerScale":"page-width","embed":{"backgroundColor":{"backgroundColor":"#fff","opacity":1},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}}}}],"settings":{"layoutType":"thumbDot","autoPlay":false,"playSpeed":5,"backgroundColor":"","backgroundOpacity":100,"displayPlayButton":true,"displayGridView":true,"displayFullScreenMode":true}}},"position":{"x":8,"y":521,"h":262,"w":4,"autoHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","name":{"fontSize":40}},"classes":[]},{"id":283296425,"sourceId":192276595,"pageId":77075051,"slideId":89848391,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"2naji","text":"For my talent competency I am researching sustainable photopolymers, with the goal of reducing the environmental impact of polymer-based materials used in manufacturing processes. Traditional photopolymers are often derived from petroleum-based feedstocks and can involve toxic components. My work investigates potentially recyclable materials that maintain material performance while prioritize environmental impact.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":417,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":417,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"7qt53","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"5gvo0","text":"An important component of this research is the crosslinking behavior in thiol–ene photopolymers. By studying how variations in reactants influence network formation, I study the relationship between curing, crosslink density, and final material structure. I also perform rheological measurements to characterize changes in viscosity and gelation behavior during and after curing, providing information on processability and printability. The rheological differences are then compared with tensile performance, including strength, elasticity, and failure behavior, to evaluate how reactant choices influence mechanical properties.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":629,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":629,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"v2os","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"fusfb","text":"This research directly relates to my Grand Challenges Scholars Program theme of sustainability, demonstrating how intentional materials design can reduce waste, improve processing efficiency, and create longer-lasting, more reliable polymer products. As a Grans Challenges Scholar I have benefitted from participation in the completion of this competency because I may not have gained undergraduate research experience and a publication if I was not a part of this program. I have now gained more experience as a Chemical Engineer because this program required me to go above and beyond the classic requirements of my degree. These experiences continue to shape my expertise as an engineer, and I feel confident about stepping into my career field after being a part of the Grand Challenges Scholars Program. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":809,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":809,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":0,"h":695,"w":8,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica, Arial, sans-serif","fontSize":19,"color":"#333333","textAlign":"left","name": ":{"x":7,"y":146,"h":97,"w":5,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#FAFAFA","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equation":{"fontSize":"","color":"","borderColor":"","backgroundColor":"","padding":0},"link":{"fontFamily":"","fontSize":"","color":"#337ab7","padding":0,"textDecoration":""},"linkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"decimal","padding":0},"backgroundColor":{"backgroundColor":"#424242","opacity":0.8},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}},"classes":[]}],"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","slideBackgroundColor":{"backgroundColor":"#FAFAFA","opacity":0.25},"slideBackgroundImage":{"backgroundAttachment":"fixed","backgroundSize":"cover","opacity":1},"contentBackgroundColor":{"backgroundColor":"#E0E0E0","opacity":0.25},"contentBackgroundImage":{"backgroundAttachment":"fixed","backgroundSize":"cover","opacity":1},"name":{"fontFamily":"Helvetica","fontSize":40,"color":"#333","textAlign":"left","hover":{"color":""},"padding":0}}},{"id":89848396,"pageId":77075053,"portfolioId":4699930,"isDraft":false,"name":null,"order":12,"isHeader":false,"isHidden":false,"modules":[{"id":283296436,"sourceId":0,"pageId":77075053,"slideId":89848396,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"fjv71","text":"This course provided a beneficial learning experience by allowing me to learn about sustainability from first hand experience rather than solely theory. In addition to the course, I studied internationally in the Ecuadorian Amazon rainforest, where I gained knowledge on sustainability practices from the perspectives of the Waorani Indigenous peoples. Their relationship with the environment emphasized balance, interdependence, and respect for the planet. Learning directly from Indigenous communities helped develop my understanding of how sustainability extends beyond environmental protection and involves cultural understanding, and social responsibility.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":661,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":661,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"5g9j9","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"fhh2j","text":"A key takeaway from this experience was the concept of Two-Eyed Seeing, which emphasizes learning from Indigenous knowledge while continuing to utilize my Western education engineering techniques. Learning from Amazonian perspectives on water systems, biodiversity, seasonal cycles, and ecological relationships, I learned how sustainability solutions can be informed by generations of experiential knowledge. This challenged my conventional engineering mindset and encouraged me to consider emotional, cultural, and spiritual dimensions of sustainability alongside technical and economic factors. Additionally, this experience helped to in further understanding why my previous engineering project in Da Nang, Vietnam was under scrutiny by the shrimp farmers.  ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":762,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":762,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"4j20m","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"3k405","text":"The course also highlighted the importance of understanding multiple perspectives and cultures when approaching sustainability design. While Western experimental methods have many benefits, Indigenous knowledge can demonstrated how sustainable practices can involve a connection with the earth that can make the solution feel more obvious than compared to classic design techniques that we most commonly utilize. I think that there is a lot that can be learned from indigenous knowledge, and I think in combination with western sustainability approaches we can develop some truly innovative and  impactful solutions. This program directly benefits my Grand Challenges Scholars Program sustainability focus, as it reinforced the need to design engineering solutions that are not only technically effective but also culturally responsive and ethical. Overall, this experience strengthened my ability to approach sustainability challenges through a multicultural lens that values diverse knowledge systems and prioritizes solutions that benefit both people and the planet.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":1069,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":1069,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":0,"h":640,"w":12,"minH":532,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#333333","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equatio sion":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#FAFAFA","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equation":{"fontSize":"","color":"","borderColor":"","backgroundColor":"","padding":0},"link":{"fontFamily":"","fontSize":"","color":"#337ab7","padding":0,"textDecoration":""},"linkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"decimal","padding":0},"backgroundColor":{"backgroundColor":"#424242","opacity":0.8},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}},"classes":[]}],"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","slideBackgroundColor":{"backgroundColor":"#FAFAFA","opacity":0.25},"slideBackgroundImage":{"backgroundAttachment":"fixed","backgroundSize":"cover","opacity":1},"contentBackgroundColor":{"backgroundColor":"#E0E0E0","opacity":0},"contentBackgroundImage":{"backgroundAttachment":"fixed","backgroundSize":"cover","opacity":1,"backgroundImage":"files/1920-GsrIhxG0RKubAgMXgYyD.jpg"},"name":{"fontFamily":"Helvetica","fontSize":40,"color":"#333","textAlign":"left","hover":{"color":""},"padding":0}}},{"id":89848398,"pageId":77075054,"portfolioId":4699930,"isDraft":false,"name":null,"order":12,"isHeader":false,"isHidden":false,"modules":[{"id":283296440,"sourceId":0,"pageId":77075054,"slideId":89848398,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"c10br","text":"My study abroad experience in Da Nang, Vietnam worked on creating a sustainable engineering solution to support local shrimp farmers maintain healthy aquaculture systems while protecting local water resources. Our team worked on designing a device to monitor water quality and farm conditions, to maintain shrimp health and reduce environmental impact. Because water from the shrimp farms is continuously recycled back into the river system after each farming season, maintaining water purity was critical not only for the agriculture but also for the health of the neighboring ecosystem.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":588,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":588,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"9vg8t","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"1s34n","text":"This project focuses on my Grand Challenges Scholars Program sustainability focus by addressing the challenges of food production, water quality, and environmental health. Rather than viewing sustainability as a technical problem, the project recognized that agricultural practices affect the community and natural water systems are deeply involved in the health of the surrounding environment. Designing a solution was difficult because it meant that not only did we need to approach the solution with the farmer's needs in mind, but we also needed it to be economically feasible for this are of the world while simultaneously solving the problem at hand. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":657,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":657,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"7gg22","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"f1ak2","text":"One of the most significant challenges we faced was gaining acceptance of our solution. Many of the shrimp farmers were hesitant to utilize the device, as they relied on generations of experiential knowledge and had limited use for modern technology in their daily life. This highlighted an important lesson in sustainable engineering, which was that, even well-designed solutions can fail if they do not align with local values, trust, and lived experience. As a team, we learned the importance of humility, active listening, and adapting our design to fit the needs of the community rather than imposing external solutions and having a \"savior's\" mindset about the project.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":675,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":675,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"a2065","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"7fa94","text":"Through this experience, I gained a strong understanding of sustainability from human-centered design. The project had meaningful, lasting impact that requires innovation along with cultural awareness. These ideas are central to the Grand Challenges Scholars Program and continue to shape how I approach sustainable engineering solutions. Throughout each of my multicultural experiences I have gained knowledge about solution design and implementation that helped to shape my career in engineering that focuses on understanding the community I am working with. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":561,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":561,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":0,"h":640,"w":12,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#333333","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0}, ":false,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","name":{"fontSize":40}},"classes":[]},{"id":283296446,"sourceId":0,"pageId":77075056,"slideId":89848401,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"3gq5j","text":"Taking this course during my first semester at Arizona State University helped to introduce me to the engineering program. Through the course, I had the opportunity to connect with faculty working on cutting-edge research addressing global challenges. It also introduced me to important university resources that have benefitted my academic and professional development, including the Engineering Projects in Community Service (EPICS) program. I am especially grateful that FSE 150 was one of the first courses I took at ASU, as it directly influenced my decision to enroll in FSE 104 (EPICS) during the following spring semester.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":630,"style":"FONT_SIZE_12"},{"offset":0,"length":630,"style":"FONT_NAME_Times New Roman"}],"entityRanges":[],"data":{}},{"key":"ighi","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"9dota","text":"In addition, the course allowed me to complete a research project aligned with my academic interests, which helped spark my interests in the types of challenges I want to address through further research as an engineering student. In particular, my project on neurodegenerative diseases inspired me to pursue research with Dr. Jeffrey Kordower in the neurodegenerative research laboratory the following summer. My first ever research paper that I wrote for this course is shown on this page, and it focuses on the neuroregenerative affects of Lion's Mane mushroom in treating neurodegenerative diseases like Parkinson's and Alzheimer's disease. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":645,"style":"FONT_SIZE_12"},{"offset":0,"length":645,"style":"FONT_NAME_Times New Roman"}],"entityRanges":[],"data":{}},{"key":"as77c","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"946ua","text":"Through my experiences in FSE 150, 250, and 350, I have gained meaningful research experience in areas that genuinely interest me, which has kept me motivated to continue fulfilling the competencies of the Grand Challenges Scholars Program (GCSP). These courses have played a significant role in helping me identify my passions within engineering and pursue them through research, study abroad, and interdisciplinary coursework","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":427,"style":"FONT_SIZE_12"},{"offset":0,"length":427,"style":"FONT_NAME_Times New Roman"}],"entityRanges":[],"data":{}},{"key":"880gh","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":83,"h":885,"w":5,"minH":831,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#333333","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equation":{"fontSize":"","color":"","borderColor":"","backgroundColor":"","padding":0},"link":{"fontFamily":"","fontSize":"","color":"#337ab7","padding":0,"textDecoration":""},"linkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize" ing solely on technical problem-solving, the course emphasized how engineering and technological advancements are shaped by human needs, political systems, and cultural values across different regions and time periods. This perspective strengthened my ability to think beyond equations and design constraints, and instead consider the broader implications of engineering decisions.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":557,"style":"FONT_SIZE_12"},{"offset":0,"length":557,"style":"FONT_NAME_Times New Roman"}],"entityRanges":[],"data":{}},{"key":"46eme","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"2a9vg","text":"Through research and writing assignments, I developed skills that complement my engineering education, including analytical writing, critical thinking, and learning about advancing complex ideas into real projects. These skills are essential for interdisciplinary work, particularly when communicating technical ideas to non-engineering audiences or when considering the long-term impacts of innovation.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":403,"style":"FONT_SIZE_12"},{"offset":0,"length":403,"style":"FONT_NAME_Times New Roman"}],"entityRanges":[],"data":{}},{"key":"64jc0","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"77c4p","text":"By examining both Western and non-Western contributions to engineering and technology, the course reinforced the importance of diverse perspectives in innovation. Understanding how engineering solutions have evolved across cultures and historical contexts has informed how I approach the current engineering challenges that I face, especially those related to sustainability. Overall, this course strengthened my ability to utilize technical knowledge with historical context. Shown below is a report that I wrote investigating the history of the construction of the Golden Gate Bridge. The engineering, design and construction of this bridge was demanding and challenged the limitations on what could be done safely during the early twentieth century. This report was one of the assignments that I had for my History of Engineering course, and it helped contextualize the large scale challenges that we must address as engineers. Addressing large scale challenges are what we are known for in the Grand Challenges Scholars Program, so this course helped to broaden my understanding of the complex and innovative challenges that we take on as engineers. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":1154,"style":"FONT_SIZE_12"},{"offset":0,"length":1154,"style":"FONT_NAME_Times New Roman"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":120,"h":477,"w":12,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#333333","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equation":{"fontSize":"","color":"","borderColor":"","backgroundColor":"","padding":0},"link":{"fontFamily":"","fontSize":"","color":"#337ab7","padding":0,"textDecoration":""},"linkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"decimal","padding":0},"backgroundColor":{"backgroundColor":"#fafafa","opacity":0.8},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}},"classes":[]},{"id":283296447,"sourceId":0,"pageId":77075057,"slideId":898 inkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"decimal","padding":0},"backgroundColor":{"backgroundColor":"#212121","opacity":0.8},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}},"classes":[]},{"id":283296453,"sourceId":0,"pageId":77075058,"slideId":89848405,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"6jfuj","text":"This course helped me develop essential entrepreneurship skills by teaching me how to identify opportunities for an idea to develop into a real project, and think strategically about business models. I learned how to analyze customer groups, understand market needs, and plan steps to bring an idea from concept to reality. Preparing and delivering pitches gave me practical experience communicating my ideas clearly to potential customers, and investors while also teaching me the importance of receiving feedback and changing my approach. Working with classmates from diverse backgrounds further strengthened my ability to contribute in a team setting, compare different ideas, and utilize different perspectives to improve an innovative idea. Overall, this course provided entrepreneurial thinking and problem-solving skills that I can apply both in professional settings and in future engineering projects.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":910,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":910,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"4hfev","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"278mh","text":"These skills directly support my Grand Challenges Scholars Program focus on sustainability, particularly in translating sustainable engineering solutions from the laboratory to becoming a real-world solution. Many sustainable technologies, including my research on sustainable photopolymers, face barriers not because of technical limitations but due to challenges within the market, or due to scalability, and cost competitiveness. This course helped me understand how to frame sustainability as valuable in addressing customer needs, regulatory pressures, and economic viability.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":581,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":581,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}},{"key":"7b65i","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"jcon","text":"By applying entrepreneurial ideas to sustainability challenges, I gained knowledge on how innovative materials and processes can reduce environmental impact while remaining economically justifiable. This reinforces the importance of designing sustainable solutions that are economically viable, and socially accepted. This course directly impacted my experience with the Grand Challenges Scholars Program and prepares me to contribute meaningfully to sustainable engineering innovation. Below is my evidence based pitch design that I proposed for this course, it is a travel based app that helps to connect travelers, and help bring access to travel for more people. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":667,"style":"FONT_NAME_Times New Roman"},{"offset":0,"length":667,"style":"FONT_SIZE_15"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":128,"h":532,"w":12,"minH":505,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#333333","textAlign":"left","name":{"fontSize":40},"padding":35,"hea e,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"d1jm2","text":"During the fall semester of my sophomore year, I participated in a study abroad program in Da Nang, Vietnam with the Global EPICS team. Through this experience, I gained valuable insight into effective data collection, research methods, and community-driven engineering design. Our team developed and refined a prototype solution and presented our findings at a research symposium hosted by a local college in Da Nang.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":418,"style":"FONT_SIZE_12"},{"offset":0,"length":418,"style":"FONT_NAME_Times New Roman"}],"entityRanges":[],"data":{}},{"key":"f35o6","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"cf89u","text":"Throughout the program, we engaged with professors and industry professionals who are actively working on large-scale sustainability initiatives in Vietnam. These interactions helped me better understand how engineers approach complex and real-world challenges. Hearing questions and concerns from professionals in the field prompted our team to critically evaluate and revise aspects of our original design, strengthening both the technical and practical impact of the project.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":478,"style":"FONT_SIZE_12"},{"offset":0,"length":478,"style":"FONT_NAME_Times New Roman"}],"entityRanges":[],"data":{}},{"key":"34sp4","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"5sfnl","text":"During my second year on the project, I took on a leadership role, guiding the team through a redesign that improved the usefulness and relevance of our solution for our community partner. This coursework provided meaningful hands-on engineering experience and reinforced the importance of collaboration, adaptability, and community engagement in developing :false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"86vc6","text":"Being a Grand Challenges Scholar has provided me with a multidisciplinary foundation that extends beyond traditional engineering education. Through this program, I developed the ability to approach complex technical problems while considering environmental, social, and economic impacts. My coursework and projects strengthened my systems-level thinking, allowing me to evaluate engineering solutions not only for technical performance but also for sustainability and long-term societal benefit.","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"mv32","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"3qc60","text":"A key component of this experience was my international engineering project in Da Nang, Vietnam, where I contributed to the development of a water purification and pumping system for shrimp farms. This project allowed me to apply engineering principles to real-world challenges while working within the constraints of local infrastructure and resources. Through this experience, I gained valuable insight into global water management challenges and learned how engineering solutions must be tailored to the needs of specific communities and environments.","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"7hs60","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"camon","text":"My academic coursework further strengthened this interdisciplinary perspective. In my history of engineering course, I explored how engineering innovations have shaped societies over time and how ethical considerations influence technological development. Additionally, my entrepreneurship coursework introduced me to the process of transforming technical ideas into practical solutions, emphasizing innovation, problem identification, and the economic feasibility of engineering technologies.","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"1n8pu","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"2olpf","text":"Overall, the Grand Challenges Scholars experience has prepared me to approach my career as an engineer with both technical expertise and a broader sense of responsibility. It has equipped me with the skills to collaborate across disciplines, design sustainable engineering solutions, and contribute to technologies that address global challenges such as water quality, environmental protection, and sustainable infrastructure.","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":0,"h":695,"w":12,"minH":695,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#333333","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equation":{"fontSize":"","color":"","borderColor":"","backgroundColor":"","padding":0},"link":{"fontFamily":"","fontSize":"","color":"#337ab7","padding":0,"textDecoration":""},"linkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"decimal","padding":0},"backgroundColor":{"backgroundColor":"#fafafa","opacity":0.8},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}},"classes":[]},{"id":284665497,"sourceId":0,"pag
